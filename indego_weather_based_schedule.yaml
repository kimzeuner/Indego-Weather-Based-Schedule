blueprint:
  name: Indego Weather-Based Mowing Schedule
  description: "## Bosch Indego Weather-Based Mowing Schedule\n\n
    ⚠️ BOSCH INDEGO INTEGRATION REQUIRED\n
    https://github.com/sander1988/Indego/tree/develop\n\n
    Automatically generates and updates Bosch Indego mowing calendar slots
    based on hourly weather forecasts.\n
    Suitable mowing windows are determined using precipitation, rain probability, temperature, and dew conditions.\n
    The blueprint updates the Indego weekly schedule only when changes are
    detected, reducing unnecessary API calls.\n"
  domain: automation
  source_url: https://raw.githubusercontent.com/kimzeuner/Indego-Weather-Based-Schedule/main/indego_weather_based_schedule.yaml
  author: kimzeuner
  homeassistant:
    min_version: "2025.1.0"
  input:
    mower:
      name: 🤖 Lawn Mower
      collapsed: true
      input:
        mower_entity:
          name: 🤖 Lawn Mower Entity
          description: >
            Lawn mower entity of your Bosch Indego. Used to send the mower back
            to the dock when rain is detected or when today's schedule is skipped.
          selector:
            entity:
              filter:
                - domain: lawn_mower
                
        dock_on_rain:
          name: 🌧️ Dock Mower on Rain
          description: >
            Enable this to send the mower back to the dock when rain is detected.
          default: true
          selector:
            boolean:
            
        rain_now_sensor:
          name: 🌧️ Rain Now Sensor
          description: >
            Optional sensor or binary sensor used to detect current rain.
            If the value is greater than 0, the mower will be sent back to the dock.
          default: ""
          selector:
            entity:
              filter:
                - domain:
                    - sensor
                    - binary_sensor

    weather_source:
      name: 🌦️ Weather Source
      collapsed: true
      input:
        weather_entity:
          name: 🌦️ Weather Entity
          description: >
            Weather entity providing the hourly forecast used to determine
            suitable mowing windows.
          selector:
            entity:
              filter:
                - domain: weather
                
        weather_data_mode:
          name: 🌦️ Weather Data Mode
          description: >
            Choose whether the blueprint should only use forecast data or allow
            optional weather station sensors to override forecast values.
          default: forecast_only
          selector:
            select:
              options:
                - label: Weather forecast only
                  value: forecast_only
                - label: Forecast with weather station override
                  value: forecast_with_station_override
                  
        station_temperature_sensor:
          name: 🌡️ Temperature Sensor
          description: >
            Optional temperature sensor from your own weather station.
            If set and override mode is enabled, this value overrides the forecast
            temperature for the current day.
          default: ""
          selector:
            entity:
              filter:
                - domain: sensor
                  device_class: temperature
                  
        station_precipitation_sensor:
          name: 🌧️ Precipitation Sensor
          description: >
            Optional precipitation sensor from your own weather station.
            If set and override mode is enabled, this value overrides the forecast
            precipitation value for the current day.
          default: ""
          selector:
            entity:
              filter:
                - domain: sensor
                
        station_rain_probability_sensor:
          name: 🌧️ Rain Probability Sensor
          description: >
            Optional rain probability sensor.
            If set and override mode is enabled, this value overrides the forecast
            rain probability for the current day.
          default: ""
          selector:
            entity:
              filter:
                - domain: sensor
                
        station_dew_point_sensor:
          name: 💧 Dew Point Sensor
          description: >
            Optional dew point sensor from your own weather station.
            If set and override mode is enabled, this value overrides the forecast
            dew point for the current day.
          default: ""
          selector:
            entity:
              filter:
                - domain: sensor
                  device_class: temperature
  
    scheduling:
      name: ⏱️ Scheduling
      collapsed: true
      input:
        day_start:
          name: ⏱️ Earliest Mowing Time
          description: >
            Beginning of the daily time window in which mowing may be scheduled.
            Forecast data outside this period will be ignored.
          default: "08:00:00"
          selector:
            time:
    
        day_end:
          name: ⏱️ Latest Mowing Time
          description: >
            End of the daily time window in which mowing may be scheduled.
            Forecast data outside this period will be ignored.
          default: "20:00:00"
          selector:
            time:

        enable_skip_today:
          name: Enable Skip Today's Schedule
          description: >
            Enable this if you want to use an input_boolean helper to skip today's
            mowing schedule and send the mower back to the dock.
          default: false
          selector:
            boolean:
            
        skip_today_entity:
          name: ⏱️ Skip Today's Schedule
          description: >
            Input_boolean helper used to skip today's mowing schedule.
            Required only when "Enable Skip Today's Schedule" is enabled.
          default: ""
          selector:
            entity:
              filter:
                - domain: input_boolean
                
        last_applied_plan_entity:
          name: ⚙️ Last Applied Plan Storage
          description: >
            Input text helper used to store the last generated mowing plan.
            Prevents unnecessary calendar updates when the calculated plan
            has not changed.
          selector:
            entity:
              filter:
                - domain: input_text
                
    weather_thresholds:
      name: 🌡️ Weather Thresholds
      collapsed: true
      input:
        min_temperature:
          name: 🌡️ Minimum Temperature
          description: >
            Minimum air temperature required for mowing.
            Hours below this temperature will be considered unsuitable.
          default: 8
          selector:
            number:
              min: -10
              max: 30
              step: 0.5
              unit_of_measurement: "°C"
    
        max_temperature:
          name: 🌡️ Maximum Temperature
          description: >
            Maximum air temperature allowed for mowing.
            Set to 0 to disable the upper temperature limit.
          default: 0
          selector:
            number:
              min: 0
              max: 50
              step: 1
              unit_of_measurement: "°C"
    
        max_precipitation:
          name: 🌧️ Maximum Precipitation
          description: >
            Maximum hourly precipitation amount allowed for mowing.
            Hours exceeding this value will be treated as rainy.
          default: 0.5
          selector:
            number:
              min: 0
              max: 10
              step: 0.1
              unit_of_measurement: "mm"
    
        max_rain_probability:
          name: 🌧️ Maximum Rain Probability
          description: >
            Maximum forecast rain probability allowed for mowing.
            Hours above this threshold will be considered unsuitable.
          default: 75
          selector:
            number:
              min: 0
              max: 100
              step: 1
              unit_of_measurement: "%"
    
        min_dew_gap:
          name: 💧 Minimum Temperature / Dew Point Difference
          description: >
            Minimum required difference between air temperature and dew point
            during the morning dew check period. Smaller values indicate
            increased likelihood of wet grass.
          default: 2
          selector:
            number:
              min: 0
              max: 10
              step: 0.5
              unit_of_measurement: "°C"
    
        dew_check_before_hour:
          name: ⏱️ Morning Dew Check Until Hour
          description: >
            Morning hours before this time are checked for excessive dew.
            Example: a value of 10 means dew conditions are evaluated
            from 00:00 until 09:59.
          default: 10
          selector:
            number:
              min: 0
              max: 23
              step: 1
  
    notifications:
      name: 📱 Notifications
      collapsed: true
      input:
        send_notification:
          name: Send Notification on Schedule Change
          description: >
            Enable this to send a notification whenever the calculated mowing
            schedule changes.
          default: false
          selector:
            boolean:
    
        notification_action:
          name: Notification Action
          description: >
            Optional action that will be executed whenever the mowing schedule changes.
        
            Available template variables:
        
            • {{ notification_title }}
              Default notification title.
            • {{ notification_message }}
              Human-readable summary of all detected changes.
            • {{ notification_changes }}
              List of all changed schedule entries.
            • {{ notification_day }}
              Day of the first detected change.
            • {{ notification_old }}
              Previous time slots for the first detected change.
            • {{ notification_new }}
              New time slots for the first detected change.
            • {{ notification_time }}
              Previous and new time slots combined
              (e.g. 08:00-17:00,18:00-20:00 → 08:00-20:00,-).
          default: []
          selector:
            action:
triggers:
  - trigger: time
    at: "06:00"
    id: update_schedule
  - trigger: time_pattern
    minutes: /30
    id: update_schedule
  - trigger: homeassistant
    event: start
    id: update_schedule
  - trigger: time_pattern
    minutes: /10
    id: rain_check
  - trigger: state
    entity_id: !input skip_today_entity
    to: "on"
    id: skip_today
    enabled: !input enable_skip_today
  - trigger: time
    at: "00:05:00"
    id: reset_skip_today
    enabled: !input enable_skip_today

actions:
  - variables:
      weather_entity: !input weather_entity
      last_applied_plan_entity: !input last_applied_plan_entity
      skip_today_entity: !input skip_today_entity
      day_start_input: !input day_start
      day_end_input: !input day_end
      min_temperature: !input min_temperature
      max_temperature: !input max_temperature
      max_precipitation: !input max_precipitation
      max_rain_probability: !input max_rain_probability
      min_dew_gap: !input min_dew_gap
      dew_check_before_hour: !input dew_check_before_hour
      send_notification: !input send_notification
      weather_data_mode: !input weather_data_mode
      station_temperature_sensor: !input station_temperature_sensor
      station_precipitation_sensor: !input station_precipitation_sensor
      station_rain_probability_sensor: !input station_rain_probability_sensor
      station_dew_point_sensor: !input station_dew_point_sensor
      mower_entity: !input mower_entity
      dock_on_rain: !input dock_on_rain
      rain_now_sensor: !input rain_now_sensor
      enable_skip_today: !input enable_skip_today

  - choose:
        - conditions:
            - condition: trigger
              id: rain_check
            - condition: template
              value_template: >
                {{ dock_on_rain
                   and rain_now_sensor != ''
                   and states(rain_now_sensor) | float(0) > 0 }}
          sequence:
            - action: lawn_mower.dock
              target:
                entity_id: !input mower_entity
            - stop: "Mower docked because rain was detected."
  
        - conditions:
            - condition: trigger
              id: skip_today
          sequence:
            - variables:
                today_name: >
                  {{ ['monday','tuesday','wednesday','thursday','friday','saturday','sunday'][now().weekday()] }}
            - action: indego.set_calendar_slot
              data:
                days: "{{ today_name }}"
                slot: 1
                enabled: false
            - action: indego.set_calendar_slot
              data:
                days: "{{ today_name }}"
                slot: 2
                enabled: false
            - action: lawn_mower.dock
              target:
                entity_id: !input mower_entity
            - stop: "Today's Indego schedule was skipped."
  
        - conditions:
            - condition: trigger
              id: reset_skip_today
          sequence:
            - action: input_boolean.turn_off
              target:
                entity_id: !input skip_today_entity
            - stop: "Skip today helper was reset."
            
  - condition: trigger
    id: update_schedule
    
  - action: weather.get_forecasts
    target:
      entity_id: !input weather_entity
    data:
      type: hourly
    response_variable: forecast

  - variables:
      plan_json: >
        {% set f = forecast[weather_entity].forecast %}
        {% set weekdays = ['monday','tuesday','wednesday','thursday','friday','saturday','sunday'] %}
        {% set ns = namespace(plan=[]) %}

        {% for offset in range(0, 7) %}
          {% set day_start = today_at(day_start_input) + timedelta(days=offset) %}
          {% set day_end = today_at(day_end_input) + timedelta(days=offset) %}
          {% set day_name = weekdays[(now().weekday() + offset) % 7] %}
          {% set s = namespace(in_slot=false, start='', start_ts=0, slots=[]) %}

          {% if offset == 0 %}
            {% set first_fc = f | selectattr('datetime', 'defined') | list | first %}
            {% if first_fc is defined %}
              {% set first_dt = as_local(as_datetime(first_fc.datetime)) %}
              {% if first_dt > day_start and first_dt < day_end %}
                {% set s.in_slot = true %}
                {% set s.start = day_start_input[:5] %}
                {% set s.start_ts = as_timestamp(day_start) %}
              {% endif %}
            {% endif %}
          {% endif %}

          {% for h in f %}
            {% set dt = as_local(as_datetime(h.datetime)) %}

            {% if day_start <= dt < day_end %}
              {% set use_station_override =
                weather_data_mode == 'forecast_with_station_override'
                and offset == 0
              %}
              
              {% set forecast_precipitation = h.precipitation | float(0) %}
              {% set forecast_rain_probability = h.precipitation_probability | float(0) %}
              {% set condition = h.condition %}
              {% set forecast_temperature = h.temperature | float(0) %}
              {% set forecast_dew_point = h.dew_point | float(0) %}
              
              {% set station_temperature =
                states(station_temperature_sensor) | float(none)
                if use_station_override and station_temperature_sensor != ''
                else none
              %}
              
              {% set station_precipitation =
                states(station_precipitation_sensor) | float(none)
                if use_station_override and station_precipitation_sensor != ''
                else none
              %}
              
              {% set station_rain_probability =
                states(station_rain_probability_sensor) | float(none)
                if use_station_override and station_rain_probability_sensor != ''
                else none
              %}
              
              {% set station_dew_point =
                states(station_dew_point_sensor) | float(none)
                if use_station_override and station_dew_point_sensor != ''
                else none
              %}
              
              {% set temperature =
                station_temperature if station_temperature is not none else forecast_temperature
              %}
              
              {% set precipitation =
                station_precipitation if station_precipitation is not none else forecast_precipitation
              %}
              
              {% set rain_probability =
                station_rain_probability if station_rain_probability is not none else forecast_rain_probability
              %}
              
              {% set dew_point =
                station_dew_point if station_dew_point is not none else forecast_dew_point
              %}
              
              {% set dew_gap = temperature - dew_point %}

              {% set hard_rain =
                precipitation >= max_precipitation
                or rain_probability >= max_rain_probability
                or condition in ['pouring', 'lightning', 'hail', 'snowy', 'snowy-rainy']
              %}

              {% set too_much_dew =
                dt.hour < dew_check_before_hour
                and dew_gap < min_dew_gap
              %}

              {% set dry =
                not hard_rain
                and not too_much_dew
                and temperature > min_temperature
                and (
                  max_temperature == 0
                  or temperature <= max_temperature
                )
              %}

              {% if dry and not s.in_slot %}
                {% set s.in_slot = true %}
                {% set s.start = dt.strftime('%H:%M') %}
                {% set s.start_ts = as_timestamp(dt) %}
              {% elif not dry and s.in_slot %}
                {% set duration = as_timestamp(dt) - s.start_ts %}
                {% if duration >= 7200 %}
                  {% set s.slots = s.slots + [s.start ~ '-' ~ dt.strftime('%H:%M')] %}
                {% endif %}
                {% set s.in_slot = false %}
              {% endif %}
            {% endif %}
          {% endfor %}

          {% if s.in_slot %}
            {% set duration = as_timestamp(day_end) - s.start_ts %}
            {% if duration >= 7200 %}
              {% set s.slots = s.slots + [s.start ~ '-' ~ day_end_input[:5]] %}
            {% endif %}
          {% endif %}

          {% set ns.plan = ns.plan + [{'day': day_name, 'slots': s.slots[:2]}] %}
        {% endfor %}

        {{ ns.plan }}

      current_plan_key: >-
        {% set ns = namespace(parts=[]) %}
        {% for d in plan_json %}
          {% set slots = d.slots %}
          {% set slot1 = slots[0] if slots | count > 0 else '-' %}
          {% set slot2 = slots[1] if slots | count > 1 else '-' %}
          {% set ns.parts = ns.parts + [d.day ~ ':' ~ slot1 ~ ',' ~ slot2] %}
        {% endfor %}
        {{ ns.parts | join('|') }}

      last_plan_key: "{{ states(last_applied_plan_entity) }}"
      plan_summary: >-
        {% set ns = namespace(lines=[]) %}
        {% for d in plan_json %}
          {% set slots = d.slots %}
          {% set slot1 = slots[0] if slots | count > 0 else 'disabled' %}
          {% set slot2 = slots[1] if slots | count > 1 else 'disabled' %}
          {% set ns.lines = ns.lines + [d.day ~ ': ' ~ slot1 ~ ', ' ~ slot2] %}
        {% endfor %}
        {{ ns.lines | join('\n') }}

      notification_changes: >-
        {% set old_parts = last_plan_key.split('|') if last_plan_key not in ['unknown', 'unavailable', ''] else [] %}
        {% set new_parts = current_plan_key.split('|') %}
        {% set ns = namespace(lines=[]) %}
        {% for new in new_parts %}
          {% set day = new.split(':', 1)[0] %}
          {% set old = old_parts | select('search', '^' ~ day ~ ':') | list | first | default('') %}
          {% if old != new %}
            {% set old_value = old.split(':', 1)[1] if ':' in old else 'none' %}
            {% set new_value = new.split(':', 1)[1] if ':' in new else 'none' %}
            {% set ns.lines = ns.lines + [day ~ ': ' ~ old_value ~ ' → ' ~ new_value] %}
          {% endif %}
        {% endfor %}
        {{ ns.lines | join('\n') }}

      notification_day: >-
        {% set old_parts = last_plan_key.split('|') if last_plan_key not in ['unknown', 'unavailable', ''] else [] %}
        {% set new_parts = current_plan_key.split('|') %}
        {% set ns = namespace(day='') %}
        {% for new in new_parts %}
          {% set day = new.split(':', 1)[0] %}
          {% set old = old_parts | select('search', '^' ~ day ~ ':') | list | first | default('') %}
          {% if ns.day == '' and old != new %}
            {% set ns.day = day %}
          {% endif %}
        {% endfor %}
        {{ ns.day }}

      notification_old: >-
        {% set old_parts = last_plan_key.split('|') if last_plan_key not in ['unknown', 'unavailable', ''] else [] %}
        {% set new_parts = current_plan_key.split('|') %}
        {% set ns = namespace(value='') %}
        {% for new in new_parts %}
          {% set day = new.split(':', 1)[0] %}
          {% set old = old_parts | select('search', '^' ~ day ~ ':') | list | first | default('') %}
          {% if ns.value == '' and old != new %}
            {% set ns.value = old.split(':', 1)[1] if ':' in old else 'none' %}
          {% endif %}
        {% endfor %}
        {{ ns.value }}

      notification_new: >-
        {% set old_parts = last_plan_key.split('|') if last_plan_key not in ['unknown', 'unavailable', ''] else [] %}
        {% set new_parts = current_plan_key.split('|') %}
        {% set ns = namespace(value='') %}
        {% for new in new_parts %}
          {% set day = new.split(':', 1)[0] %}
          {% set old = old_parts | select('search', '^' ~ day ~ ':') | list | first | default('') %}
          {% if ns.value == '' and old != new %}
            {% set ns.value = new.split(':', 1)[1] if ':' in new else 'none' %}
          {% endif %}
        {% endfor %}
        {{ ns.value }}

      notification_time: >-
        {{ notification_old ~ ' → ' ~ notification_new }}

      notification_title: "Indego mowing schedule updated"

      notification_message: >-
        {{ notification_changes }}

      change_summary: >-
        {% set old_parts = last_plan_key.split('|') if last_plan_key not in ['unknown', 'unavailable', ''] else [] %}
        {% set new_parts = current_plan_key.split('|') %}
        {% set ns = namespace(lines=[]) %}
        {% for new in new_parts %}
          {% set day = new.split(':', 1)[0] %}
          {% set old = old_parts | select('search', '^' ~ day ~ ':') | list | first | default('') %}
          {% if old != new %}
            {% set old_value = old.split(':', 1)[1] if ':' in old else 'none' %}
            {% set new_value = new.split(':', 1)[1] if ':' in new else 'none' %}
            {% set ns.lines = ns.lines + [day ~ ': ' ~ old_value ~ ' → ' ~ new_value] %}
          {% endif %}
        {% endfor %}
        {{ ns.lines | join('\n') }}

  - condition: template
    value_template: "{{ current_plan_key != last_plan_key }}"

  - repeat:
      for_each: "{{ plan_json }}"
      sequence:
        - condition: template
          value_template: >
            {% set today_name = ['monday','tuesday','wednesday','thursday','friday','saturday','sunday'][now().weekday()] %}
            {% set is_today = repeat.item.day == today_name %}
            {% set after_day_end = now() >= today_at(day_end_input) %}
            {% set skip_today =
              enable_skip_today
              and skip_today_entity != ''
              and is_state(skip_today_entity, 'on')
            %}
            {{ not (
              is_today
              and (
                after_day_end
                or skip_today
              )
            ) }}

        - variables:
            day_name: "{{ repeat.item.day }}"
            slots: "{{ repeat.item.slots }}"
            slot1: "{{ slots[0] if slots | count > 0 else '' }}"
            slot2: "{{ slots[1] if slots | count > 1 else '' }}"

        - action: indego.set_calendar_slot
          data:
            days: "{{ day_name }}"
            slot: 1
            enabled: "{{ slot1 != '' }}"
            start: "{{ slot1.split('-')[0] if slot1 != '' else day_start_input[:5] }}"
            end: "{{ slot1.split('-')[1] if slot1 != '' else day_end_input[:5] }}"

        - action: indego.set_calendar_slot
          data:
            days: "{{ day_name }}"
            slot: 2
            enabled: "{{ slot2 != '' }}"
            start: "{{ slot2.split('-')[0] if slot2 != '' else day_start_input[:5] }}"
            end: "{{ slot2.split('-')[1] if slot2 != '' else day_end_input[:5] }}"

  - if:
      - condition: template
        value_template: "{{ send_notification }}"
    then: !input notification_action

  - action: input_text.set_value
    target:
      entity_id: !input last_applied_plan_entity
    data:
      value: "{{ current_plan_key }}"

mode: single
